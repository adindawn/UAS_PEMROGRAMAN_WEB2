<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Library Novel Digital - UAS Web 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>
<body class="bg-gradient-to-tr from-violet-100 via-purple-50 to-indigo-100 text-slate-800 min-h-screen antialiased">

    <div id="app">
        <nav class="bg-white/40 backdrop-blur-xl border-b border-white/60 p-4 text-slate-700 sticky top-0 z-50 shadow-sm shadow-purple-100/20">
            <div class="container mx-auto max-w-6xl flex justify-between items-center">
                
                <h1 class="text-xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-indigo-600 flex items-center gap-2">
                    <span>🔮</span> 
                    <router-link to="/">BookFlow</router-link>
                </h1>
                
                <div class="space-x-2 font-bold flex items-center text-sm">
                    <router-link to="/" class="hover:text-purple-600 hover:bg-white/40 px-3 py-2 rounded-xl transition">Katalog</router-link>
                    
                    <template v-if="isLoggedIn">
                        <router-link to="/dashboard" class="hover:text-purple-600 hover:bg-white/40 px-3 py-2 rounded-xl transition">Dashboard Admin</router-link>
                        <router-link to="/kategori" class="hover:text-purple-600 hover:bg-white/40 px-3 py-2 rounded-xl transition">Kategori</router-link>
                        <button @click="logout" class="bg-rose-400/80 hover:bg-rose-500 text-white px-4 py-2 rounded-xl transition shadow-sm font-bold">
                            Logout
                        </button>
                    </template>
                    
                    <router-link v-else to="/login" class="bg-gradient-to-r from-purple-500 to-indigo-500 text-white hover:opacity-90 px-4 py-2 rounded-xl transition shadow-md shadow-purple-200 font-bold">
                        Login Admin
                    </router-link>
                </div>

            </div>
        </nav>

        <main class="container mx-auto p-4 md:p-6">
            <router-view></router-view>
        </main>
    </div>

    <script src="app.js?v=cute" type="module"></script>
</body>
</html>
